# Social network link definitions for the footer.
# icon: Font Awesome 6 icon class
# iconclass: "fa-brands" for brand icons, "fa-solid" for solid icons

facebook:
  name: "Facebook"
  baseURL: "https://www.facebook.com/"
  icon: "fa-facebook"
  iconclass: "fa-brands"

github:
  name: "GitHub"
  baseURL: "https://github.com/"
  icon: "fa-github"
  iconclass: "fa-brands"

twitter:
  name: "Twitter"
  baseURL: "https://twitter.com/"
  icon: "fa-x-twitter"
  iconclass: "fa-brands"

reddit:
  name: "Reddit"
  baseURL: "https://reddit.com/u/"
  icon: "fa-reddit"
  iconclass: "fa-brands"

email:
  name: "Email me"
  baseURL: "mailto:"
  icon: "fa-envelope"
  iconclass: "fa-solid"

linkedin:
  name: "LinkedIn"
  baseURL: "https://linkedin.com/in/"
  icon: "fa-linkedin"
  iconclass: "fa-brands"

xing:
  name: "Xing"
  baseURL: "https://www.xing.com/profile/"
  icon: "fa-xing"
  iconclass: "fa-brands"

stackoverflow:
  name: "StackOverflow"
  baseURL: "https://stackoverflow.com/users/"
  icon: "fa-stack-overflow"
  iconclass: "fa-brands"

snapchat:
  name: "Snapchat"
  baseURL: "https://www.snapchat.com/add/"
  icon: "fa-snapchat"
  iconclass: "fa-brands"

instagram:
  name: "Instagram"
  baseURL: "https://www.instagram.com/"
  icon: "fa-instagram"
  iconclass: "fa-brands"

youtube:
  name: "YouTube"
  baseURL: "https://www.youtube.com/"
  icon: "fa-youtube"
  iconclass: "fa-brands"

spotify:
  name: "Spotify"
  baseURL: "https://open.spotify.com/user/"
  icon: "fa-spotify"
  iconclass: "fa-brands"

telephone:
  name: "Phone"
  baseURL: "tel:"
  icon: "fa-phone"
  iconclass: "fa-solid"

rss:
  name: "RSS"
  baseURL: "{{ '/feed.xml' | relative_url }}"
  icon: "fa-rss"
  iconclass: "fa-solid"

steam:
  name: "Steam"
  baseURL: "https://steamcommunity.com/id/"
  icon: "fa-steam"
  iconclass: "fa-brands"

twitch:
  name: "Twitch"
  baseURL: "https://www.twitch.tv/"
  icon: "fa-twitch"
  iconclass: "fa-brands"

yelp:
  name: "Yelp"
  baseURL: "https://{{ site.author.yelp }}.yelp.com"
  icon: "fa-yelp"
  iconclass: "fa-brands"

keybase:
  name: "Keybase"
  baseURL: "https://keybase.io/"
  icon: "fa-keybase"
  iconclass: "fa-brands"
